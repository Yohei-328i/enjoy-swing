<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>リアル・タイミング・プロ(レスポンシブ版)</title>
    <style>
        body { 
            background: #000; color: #fff; text-align: center; 
            font-family: sans-serif; overflow: hidden; margin: 0; 
        }
        body.white-bg { background-color: #fff !important; }
        
        /* 上部情報バー */
        #header-info {
            position: absolute; top: 0; left: 0; width: 100%;
            display: flex; justify-content: space-between; padding: 10px 20px;
            box-sizing: border-box; z-index: 20; background: rgba(0,0,0,0.5);
            font-size: 4vmin; font-weight: bold; color: #aaa;
        }
        .info-label { font-size: 2.5vmin; color: #666; margin-right: 5px; }

        #display-container { display: flex; justify-content: center; align-items: center; height: 100vh; width: 100vw; }
        
        /* 修正の要：vmin（幅か高さの小さい方）を基準にする */
        #circle-container { 
            width: 80vmin; height: 80vmin; 
            position: relative; display: flex; justify-content: center; align-items: center; 
        }
        
        #svg-circle { width: 100%; height: 100%; transform: rotate(-90deg); position: absolute; }
        #circle-bg { fill: none; stroke: #333; stroke-width: 6; }
        #circle-progress {
            fill: none; stroke: #00ff00; stroke-width: 6;
            stroke-dasharray: 628; stroke-dashoffset: 628;
        }

        /* 9分割ゾーンもvmin基準に */
        #zone-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            width: 35vmin;
            height: 45vmin;
            border: 2px solid #555;
            gap: 2px;
            margin-bottom: 2vh;
            display: none;
        }
        .zone-cell { border: 1px solid #333; background: rgba(255,255,255,0.05); }
        .zone-cell.active {
            background: rgba(255, 0, 0, 0.8);
            box-shadow: 0 0 20px red;
            border-color: #fff;
        }

        #center-text { position: absolute; width: 100%; display: flex; flex-direction: column; align-items: center; z-index: 10; }
        #status-text { font-size: 10vmin; font-weight: bold; margin: 0; }
        #result-text { font-size: 8vmin; color: #fff; font-weight: bold; display: none; }
        
        .speed-val { font-size: 14vmin; }
        .unit { font-size: 4vmin; margin-left: 5px; color: #ccc; }

        body.white-bg #status-text, body.white-bg .speed-val { color: #000; }
        body.white-bg .unit { color: #333; }
        
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; justify-content: center; align-items: center; z-index: 100; }
        #start-btn { padding: 3vmin 6vmin; font-size: 4vmin; font-weight: bold; background: #00ff00; color: #000; border-radius: 10px; border: none; cursor: pointer; }
    </style>
</head>
<body>

    <div id="header-info">
        <div id="elapsed-time"><span class="info-label">TIME</span>00:00</div>
        <div id="pitch-count"><span class="info-label">COUNT</span>0回</div>
    </div>

    <div id="overlay">
        <button id="start-btn">タップしてスタート<br>(10秒後に開始します)</button>
    </div>

    <div id="display-container">
        <div id="circle-container">
            <svg id="svg-circle" viewBox="0 0 220 220">
                <circle id="circle-bg" cx="110" cy="110" r="100" />
                <circle id="circle-progress" cx="110" cy="110" r="100" />
            </svg>
            <div id="center-text">
                <p id="status-text">準備完了</p>
                <div id="zone-grid">
                    <div class="zone-cell" id="cell-0"></div><div class="zone-cell" id="cell-1"></div><div class="zone-cell" id="cell-2"></div>
                    <div class="zone-cell" id="cell-3"></div><div class="zone-cell" id="cell-4"></div><div class="zone-cell" id="cell-5"></div>
                    <div class="zone-cell" id="cell-6"></div><div class="zone-cell" id="cell-7"></div><div class="zone-cell" id="cell-8"></div>
                </div>
                <div id="result-text"></div>
            </div>
        </div>
    </div>

    <script>
        const courseNames = ["内角高め", "真ん中高め", "外角高め", "内角真ん中", "ど真ん中", "外角真ん中", "内角低め", "真ん中低め", "外角低め"];
        const speeds = [60, 70, 80, 90]; 
        const motionTime = 1200; 
        const totalCycle = 8500; 
        const realDistanceMeters = 14.5; 

        const statusText = document.getElementById('status-text');
        const resultText = document.getElementById('result-text');
        const zoneGrid = document.getElementById('zone-grid');
        const progressCircle = document.getElementById('circle-progress');
        const overlay = document.getElementById('overlay');
        const startBtn = document.getElementById('start-btn');
        const timeDisplay = document.getElementById('elapsed-time');
        const countDisplay = document.getElementById('pitch-count');

        let wakeLock = null;
        let pitchCount = 0;
        let startTime = null;
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playCatchSound() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'square';
            osc.frequency.setValueAtTime(150, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        }

        async function requestWakeLock() {
            if ('wakeLock' in navigator) {
                try { wakeLock = await navigator.wakeLock.request('screen'); } catch (err) {}
            }
        }

        function updateTimer() {
            if (!startTime) return;
            const now = Date.now();
            const diff = Math.floor((now - startTime) / 1000);
            const m = String(Math.floor(diff / 60)).padStart(2, '0');
            const s = String(diff % 60).padStart(2, '0');
            timeDisplay.innerHTML = `<span class="info-label">TIME</span>${m}:${s}`;
        }

        startBtn.addEventListener('click', () => {
            audioCtx.resume();
            overlay.style.display = 'none';
            requestWakeLock();
            
            let count = 10;
            statusText.innerText = count;
            
            const countdownInterval = setInterval(() => {
                count--;
                if (count > 0) {
                    statusText.innerText = count;
                } else {
                    clearInterval(countdownInterval);
                    startTime = Date.now();
                    setInterval(updateTimer, 1000);
                    runSequence();
                    setInterval(runSequence, totalCycle);
                }
            }, 1000);
        });

        function runSequence() {
            document.body.classList.remove('white-bg');
            statusText.style.display = 'block';
            resultText.style.display = 'none';
            zoneGrid.style.display = 'none';
            for(let i=0; i<9; i++) document.getElementById(`cell-${i}`).classList.remove('active');

            statusText.innerText = "セット";
            statusText.style.color = "#fff";
            progressCircle.style.transition = 'none';
            progressCircle.style.strokeDashoffset = 628;

            const wait = 1200 + Math.random() * 1500;
            const speedIndex = Math.floor(Math.random() * speeds.length);
            const speed = speeds[speedIndex];
            const courseIdx = Math.floor(Math.random() * 9);
            const reachTime = (realDistanceMeters / (speed / 3.6)) * 1000;

            setTimeout(() => {
                statusText.innerText = "投球";
                statusText.style.color = "#00ff00";
                progressCircle.style.transition = `stroke-dashoffset ${motionTime}ms linear`;
                progressCircle.style.strokeDashoffset = 0;

                setTimeout(() => {
                    document.body.classList.add('white-bg');
                    statusText.style.display = 'none';
                    zoneGrid.style.display = 'grid';
                    document.getElementById(`cell-${courseIdx}`).classList.add('active');
                    
                    resultText.innerHTML = `<span class="speed-val">${speed}</span><span class="unit">km/h</span>`;
                    resultText.style.display = 'block';
                    resultText.style.color = "#000";

                    setTimeout(() => { 
                        document.body.classList.remove('white-bg'); 
                        resultText.style.color = "#fff"; 
                    }, 200);

                    setTimeout(() => {
                        document.body.classList.add('white-bg');
                        playCatchSound();
                        pitchCount++;
                        countDisplay.innerHTML = `<span class="info-label">COUNT</span>${pitchCount}回`;
                        setTimeout(() => { document.body.classList.remove('white-bg'); }, 100);
                    }, reachTime);

                }, motionTime);
            }, wait);
        }
    </script>
</body>
</html>
