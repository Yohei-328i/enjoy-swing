<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>リアル・タイミング・プロ</title>
<style>
body{
  background:#000;
  color:#fff;
  text-align:center;
  font-family:sans-serif;
  overflow:hidden;
  margin:0;
}

body.white-bg{
  background:#fff!important;
}

#header-info{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  display:flex;
  justify-content:space-between;
  padding:10px 20px;
  box-sizing:border-box;
  z-index:50;
  background:rgba(0,0,0,.7);
  font-size:20px;
  font-weight:bold;
  color:#aaa;
}

.info-label{
  font-size:14px;
  color:#666;
  margin-right:5px;
}

#control-bar{
  position:fixed;
  bottom:20px;
  left:0;
  width:100%;
  display:none;
  justify-content:center;
  gap:20px;
  z-index:60;
}

.ctrl-btn{
  padding:12px 30px;
  font-size:18px;
  font-weight:bold;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

#pause-btn{
  background:#ffaa00;
  color:#000;
}

#end-btn{
  background:#ff3333;
  color:#fff;
}

#display-container{
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  padding-top:50px;
  padding-bottom:70px;
  box-sizing:border-box;
}

#main-content{
  position:relative;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  width:90vw;
  height:75vh;
}

#svg-circle{
  width:65vmin;
  height:65vmin;
  transform:rotate(-90deg);
  position:absolute;
}

#circle-bg{
  fill:none;
  stroke:#333;
  stroke-width:6;
}

#circle-progress{
  fill:none;
  stroke:#00ff00;
  stroke-width:6;
  stroke-dasharray:628;
  stroke-dashoffset:628;
}

#zone-grid{
  display:none;
  grid-template-columns:repeat(3,1fr);
  grid-template-rows:repeat(3,1fr);
  width:35vmin;
  height:45vmin;
  border:2px solid #555;
  gap:4px;
  margin-bottom:10px;
  z-index:30;
}

.zone-cell{
  border:1px solid #333;
  background:rgba(255,255,255,.05);
}

.zone-cell.active{
  background:rgba(255,0,0,.9);
  box-shadow:0 0 20px red;
  border-color:#fff;
}

#center-text{
  position:relative;
  width:100%;
  display:flex;
  flex-direction:column;
  align-items:center;
  z-index:10;
}

#status-text{
  font-size:8vmin;
  font-weight:bold;
  margin:0;
  z-index:40;
}

#result-text{
  display:none;
  z-index:40;
}

.speed-val{
  font-size:15vmin;
  font-weight:bold;
  line-height:1;
}

.unit{
  font-size:4vmin;
  margin-left:5px;
  color:#ccc;
}

body.white-bg #status-text,
body.white-bg .speed-val,
body.white-bg #zone-grid{
  color:#000;
  border-color:#000;
}

body.white-bg .unit{
  color:#333;
}

body.white-bg .zone-cell{
  border-color:#999;
}

.modal-overlay{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#000;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:100;
}

.big-btn{
  padding:20px 40px;
  font-size:24px;
  font-weight:bold;
  background:#00ff00;
  color:#000;
  border-radius:10px;
  border:none;
  cursor:pointer;
}

#result-screen{
  display:none;
  z-index:110;
}

.summary-box{
  margin-bottom:32px;
}

.summary-title{
  font-size:28px;
  color:#00ff00;
  margin-bottom:20px;
  font-weight:bold;
}

.summary-item{
  font-size:38px;
  font-weight:bold;
  margin:15px 0;
}

.summary-sub{
  font-size:24px;
  color:#ccc;
  margin:10px 0;
}

#share-btn{
  background:#1da1f2;
  color:#fff;
  margin-bottom:18px;
}

#retry-btn{
  background:#fff;
  color:#000;
  margin-bottom:18px;
}

#close-btn{
  background:#555;
  color:#fff;
}
</style>
</head>

<body>

<div id="header-info">
  <div id="elapsed-time"><span class="info-label">TIME</span>00:00</div>
  <div id="pitch-count"><span class="info-label">COUNT</span>0回</div>
</div>

<div id="overlay" class="modal-overlay">
  <button id="start-btn" class="big-btn">タップしてスタート</button>
</div>

<div id="result-screen" class="modal-overlay">
  <div class="summary-box">
    <div class="summary-title">練習お疲れ様でした！</div>
    <div id="final-date" class="summary-sub">練習日: ----/--/--</div>
    <div id="final-start-time" class="summary-sub">開始時間: --:--</div>
    <div id="final-time" class="summary-item">時間: --分--秒</div>
    <div id="final-count" class="summary-item">回数: --回</div>
  </div>

  <button id="share-btn" class="big-btn">
    練習結果をシェア
  </button>

  <button id="retry-btn" class="big-btn" onclick="location.reload();">
    もう一度練習する
  </button>

  <button id="close-btn" class="big-btn">
    画面を閉じる
  </button>
</div>

<div id="display-container">
  <div id="main-content">
    <svg id="svg-circle" viewBox="0 0 220 220">
      <circle id="circle-bg" cx="110" cy="110" r="100"></circle>
      <circle id="circle-progress" cx="110" cy="110" r="100"></circle>
    </svg>

    <div id="center-text">
      <p id="status-text">準備完了</p>

      <div id="zone-grid">
        <div class="zone-cell" id="cell-0"></div>
        <div class="zone-cell" id="cell-1"></div>
        <div class="zone-cell" id="cell-2"></div>
        <div class="zone-cell" id="cell-3"></div>
        <div class="zone-cell" id="cell-4"></div>
        <div class="zone-cell" id="cell-5"></div>
        <div class="zone-cell" id="cell-6"></div>
        <div class="zone-cell" id="cell-7"></div>
        <div class="zone-cell" id="cell-8"></div>
      </div>

      <div id="result-text"></div>
    </div>
  </div>
</div>

<div id="control-bar">
  <button id="pause-btn" class="ctrl-btn">一時停止</button>
  <button id="end-btn" class="ctrl-btn">練習終了</button>
</div>

<script>
const speeds = [60, 70, 80, 90];
const motionTime = 1200;
const totalCycle = 8500;
const realDistanceMeters = 14.5;
const circleLength = 628;

const statusText = document.getElementById('status-text');
const resultText = document.getElementById('result-text');
const zoneGrid = document.getElementById('zone-grid');
const svgCircle = document.getElementById('svg-circle');
const progressCircle = document.getElementById('circle-progress');
const overlay = document.getElementById('overlay');
const startBtn = document.getElementById('start-btn');
const timeDisplay = document.getElementById('elapsed-time');
const countDisplay = document.getElementById('pitch-count');
const controlBar = document.getElementById('control-bar');
const pauseBtn = document.getElementById('pause-btn');
const endBtn = document.getElementById('end-btn');
const resultScreen = document.getElementById('result-screen');
const shareBtn = document.getElementById('share-btn');
const closeBtn = document.getElementById('close-btn');

let wakeLock = null;

let audioCtx = null;
let catchBuffer = null;

let pitchCount = 0;
let totalElapsedSeconds = 0;
let timerInterval = null;
let cycleTimer = null;
let countdownInterval = null;
let sequenceTimeouts = [];

let isPaused = false;
let isRunning = false;
let practiceStartDate = null;
let finalShareText = '';

async function initAudio(){
  if(!audioCtx){
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }

  if(audioCtx.state === 'suspended'){
    await audioCtx.resume();
  }

  if(!catchBuffer){
    try{
      const response = await fetch('catch01.wav');
      const arrayBuffer = await response.arrayBuffer();
      catchBuffer = await audioCtx.decodeAudioData(arrayBuffer);
    }catch(e){
      console.log('catch01.wavの読み込みに失敗しました', e);
    }
  }
}

function playCatchSound(){
  if(!audioCtx || !catchBuffer) return;

  const source = audioCtx.createBufferSource();
  source.buffer = catchBuffer;

  const gain = audioCtx.createGain();
  gain.gain.value = 1.0;

  source.connect(gain);
  gain.connect(audioCtx.destination);

  source.start(audioCtx.currentTime);
}

function setSeqTimeout(fn, delay){
  const id = setTimeout(() => {
    sequenceTimeouts = sequenceTimeouts.filter(timeoutId => timeoutId !== id);
    fn();
  }, delay);

  sequenceTimeouts.push(id);
  return id;
}

function clearSequenceTimeouts(){
  sequenceTimeouts.forEach(clearTimeout);
  sequenceTimeouts = [];
}

function clearAllCycleTimers(){
  clearSequenceTimeouts();

  if(cycleTimer){
    clearInterval(cycleTimer);
    cycleTimer = null;
  }

  if(countdownInterval){
    clearInterval(countdownInterval);
    countdownInterval = null;
  }
}

function resetMainDisplay(){
  document.body.classList.remove('white-bg');

  statusText.style.display = 'block';
  statusText.style.color = '#fff';

  resultText.style.display = 'none';
  resultText.style.color = '#fff';
  resultText.innerHTML = '';

  zoneGrid.style.display = 'none';

  svgCircle.style.display = 'block';
  progressCircle.style.transition = 'none';
  progressCircle.style.strokeDashoffset = circleLength;

  for(let i = 0; i < 9; i++){
    document.getElementById(`cell-${i}`).classList.remove('active');
  }
}

function updateTimer(){
  if(isPaused || !isRunning) return;

  totalElapsedSeconds++;

  const m = String(Math.floor(totalElapsedSeconds / 60)).padStart(2, '0');
  const s = String(totalElapsedSeconds % 60).padStart(2, '0');

  timeDisplay.innerHTML = `<span class="info-label">TIME</span>${m}:${s}`;
}

async function requestWakeLock(){
  if(!('wakeLock' in navigator)) return;

  try{
    wakeLock = await navigator.wakeLock.request('screen');
  }catch(e){
    wakeLock = null;
  }
}

async function releaseWakeLock(){
  if(!wakeLock) return;

  try{
    await wakeLock.release();
  }catch(e){
  }finally{
    wakeLock = null;
  }
}

function formatDate(date){
  const y = date.getFullYear();
  const m = String(date.getMonth() + 1).padStart(2, '0');
  const d = String(date.getDate()).padStart(2, '0');
  return `${y}/${m}/${d}`;
}

function formatTime(date){
  const h = String(date.getHours()).padStart(2, '0');
  const m = String(date.getMinutes()).padStart(2, '0');
  return `${h}:${m}`;
}

function startCountdownThenLoop(){
  clearAllCycleTimers();
  resetMainDisplay();

  let count = 10;
  statusText.innerText = count;
  statusText.style.color = '#fff';

  countdownInterval = setInterval(() => {
    if(isPaused || !isRunning) return;

    count--;

    if(count > 0){
      statusText.innerText = count;
    }else{
      clearInterval(countdownInterval);
      countdownInterval = null;
      startLoop();
    }
  }, 1000);
}

startBtn.addEventListener('click', async () => {
  await initAudio();
  requestWakeLock();

  practiceStartDate = new Date();

  overlay.style.display = 'none';
  controlBar.style.display = 'flex';

  isRunning = true;
  isPaused = false;

  if(!timerInterval){
    timerInterval = setInterval(updateTimer, 1000);
  }

  startCountdownThenLoop();
});

function startLoop(){
  clearAllCycleTimers();

  runSequence();

  cycleTimer = setInterval(() => {
    if(!isPaused && isRunning){
      runSequence();
    }
  }, totalCycle);
}

pauseBtn.addEventListener('click', () => {
  if(!isRunning) return;

  if(!isPaused){
    isPaused = true;

    clearAllCycleTimers();
    document.body.classList.remove('white-bg');

    pauseBtn.innerText = '再開';
    pauseBtn.style.background = '#00ff00';

    resetMainDisplay();
    statusText.innerText = 'ストップ';
    statusText.style.color = '#ffaa00';

  }else{
    isPaused = false;

    pauseBtn.innerText = '一時停止';
    pauseBtn.style.background = '#ffaa00';

    startCountdownThenLoop();
  }
});

endBtn.addEventListener('click', async () => {
  isRunning = false;
  isPaused = false;

  clearAllCycleTimers();

  if(timerInterval){
    clearInterval(timerInterval);
    timerInterval = null;
  }

  document.body.classList.remove('white-bg');
  await releaseWakeLock();

  const m = String(Math.floor(totalElapsedSeconds / 60)).padStart(2, '0');
  const s = String(totalElapsedSeconds % 60).padStart(2, '0');

  const dateToShow = practiceStartDate || new Date();

  document.getElementById('final-date').innerText = `練習日: ${formatDate(dateToShow)}`;
  document.getElementById('final-start-time').innerText = `開始時間: ${formatTime(dateToShow)}`;
  document.getElementById('final-time').innerText = `時間: ${m}分${s}秒`;
  document.getElementById('final-count').innerText = `回数: ${pitchCount}回`;

  finalShareText =
`Enjoy Swing 練習結果

練習日: ${formatDate(dateToShow)}
開始時間: ${formatTime(dateToShow)}
練習時間: ${m}分${s}秒
素振り回数: ${pitchCount}回

#少年野球 #素振り #タイミング練習`;

  controlBar.style.display = 'none';
  resultScreen.style.display = 'flex';
});

shareBtn.addEventListener('click', async () => {
  const shareText = finalShareText || 'Enjoy Swingで練習しました。';

  const shareData = {
    title: 'Enjoy Swing 練習結果',
    text: shareText,
    url: window.location.href
  };

  if(navigator.share){
    try{
      await navigator.share(shareData);
    }catch(e){
      // ユーザーが共有をキャンセルした場合は何もしない
    }
  }else{
    try{
      await navigator.clipboard.writeText(`${shareText}\n\n${window.location.href}`);
      alert('練習結果をコピーしました');
    }catch(e){
      alert('この端末ではシェア機能を利用できません');
    }
  }
});

closeBtn.addEventListener('click', () => {
  window.close();

  setTimeout(() => {
    alert('このブラウザでは自動で閉じられない場合があります。手動でタブを閉じてください。');
  }, 300);
});

function runSequence(){
  if(isPaused || !isRunning) return;

  resetMainDisplay();

  statusText.innerText = 'セット';
  statusText.style.color = '#fff';

  const wait = 1200 + Math.random() * 1500;
  const speed = speeds[Math.floor(Math.random() * speeds.length)];
  const courseIdx = Math.floor(Math.random() * 9);
  const reachTime = (realDistanceMeters / (speed / 3.6)) * 1000;

  setSeqTimeout(() => {
    if(isPaused || !isRunning) return;

    statusText.innerText = '投球';
    statusText.style.color = '#00ff00';

    progressCircle.style.transition = `stroke-dashoffset ${motionTime}ms linear`;
    progressCircle.style.strokeDashoffset = 0;

    setSeqTimeout(() => {
      if(isPaused || !isRunning) return;

      document.body.classList.add('white-bg');

      svgCircle.style.display = 'none';
      statusText.style.display = 'none';

      zoneGrid.style.display = 'grid';
      document.getElementById(`cell-${courseIdx}`).classList.add('active');

      resultText.innerHTML = `<span class="speed-val">${speed}</span><span class="unit">km/h</span>`;
      resultText.style.display = 'block';
      resultText.style.color = '#000';

      setSeqTimeout(() => {
        if(isPaused || !isRunning) return;

        document.body.classList.remove('white-bg');
        resultText.style.color = '#fff';
      }, 150);

      setSeqTimeout(() => {
        if(isPaused || !isRunning) return;

        playCatchSound();
        document.body.classList.add('white-bg');

        pitchCount++;
        countDisplay.innerHTML = `<span class="info-label">COUNT</span>${pitchCount}回`;

        setSeqTimeout(() => {
          if(isPaused || !isRunning) return;
          document.body.classList.remove('white-bg');
        }, 100);

      }, reachTime);

    }, motionTime);

  }, wait);
}

document.addEventListener('visibilitychange', () => {
  if(document.visibilityState === 'visible' && isRunning && !isPaused){
    requestWakeLock();
  }
});
</script>

</body>
</html>
